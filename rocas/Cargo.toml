[package]
name = "rocas"
version = "1.3.2"
edition = "2024"

[build-dependencies]
winres = "0.1"

[dependencies]
log.workspace = true
auto-launch = "0.6.0"
dirs = "6.0.0"
self_update = { version = "0.42.0", default-features = false, features = [
  "rustls",
  "archive-tar",
  "archive-zip",
  "compression-flate2",
  "compression-zip-deflate",
] }

[target.'cfg(unix)'.dependencies]
libc = "0.2.182"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61.2", features = ["Win32_System_Console"] }

[dependencies.watcher]
version = "0.1.0"
path = "../watcher"

[dependencies.forgeconf]
git = "https://github.com/chikof/forgeconf"
rev = "b4b2e01707834cea02c19978746256b3a06814e9"
features = ["toml", "miette", "validators"]
default-features = false
