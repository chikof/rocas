[package]
name = "rocas"
version = "1.0.1"
edition = "2024"

[dependencies]
log = "0.4.29"
env_logger = "0.11.9"
auto-launch = "0.6.0"
self_update = { version = "0.42.0", default-features = false, features = [
  "rustls",
  "archive-tar",
  "archive-zip",
  "compression-flate2",
  "compression-zip-deflate",
] }

[dependencies.watcher]
version = "0.1.0"
path = "../watcher"

[dependencies.forgeconf]
version = "0.4.1"
features = ["toml", "miette"]
default-features = false
