[package]
name = "rocas"
version = "1.2.3"
edition = "2024"

[build-dependencies]
winres = "0.1"

[dependencies]
env_logger = "0.11.9"
log.workspace = true
auto-launch = "0.6.0"
dirs = "6.0.0"
self_update = { version = "0.42.0", default-features = false, features = [
  "rustls",
  "archive-tar",
  "archive-zip",
  "compression-flate2",
  "compression-zip-deflate",
] }

[dependencies.watcher]
version = "0.1.0"
path = "../watcher"

[dependencies.forgeconf]
git = "https://github.com/chikof/forgeconf"
rev = "2cfb91488e09945e99eba90c995d38ea043c80d5"
features = ["toml", "miette", "validators"]
default-features = false
