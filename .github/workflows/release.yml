name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rocas
            asset_name: rocas-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rocas
            asset_name: rocas-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rocas.exe
            asset_name: rocas-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed by git-cliff

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-C target-cpu=native"

      - name: Pack with UPX (Linux & Windows)
        if: matrix.os != 'macos-latest'
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            choco install upx
            upx --best --lzma target/${{ matrix.target }}/release/rocas.exe
          else
            sudo apt-get install -y upx
            upx --best --lzma target/${{ matrix.target }}/release/rocas
          fi
        shell: bash

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          tar czf ${{ matrix.asset_name }} -C target/${{ matrix.target }}/release ${{ matrix.artifact_name }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.artifact_name }} -DestinationPath ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed by git-cliff

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        id: changelog
        run: |
          # Generate notes only for commits since the previous tag so each
          # release shows just its own changes, not the full history.
          git-cliff --latest --strip header --output release-notes.md
          echo "Generated release notes:"
          cat release-notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/rocas-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            artifacts/rocas-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
            artifacts/rocas-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip
