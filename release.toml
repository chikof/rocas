# cargo-release workspace configuration
# Usage:
#   cargo release patch   # 1.2.1 -> 1.2.2
#   cargo release minor   # 1.2.1 -> 1.3.0
#   cargo release major   # 1.2.1 -> 2.0.0
#   cargo release patch --no-confirm   # non-interactive
#   cargo release patch -x             # actually execute
#
# Requires: cargo-release and git-cliff in the dev shell (nix develop)

# This is not published to crates.io — releases go to GitHub only.
publish = false

# Allow releasing from any branch (you own this repo solo).
allow-branch = ["*"]

# Push the bump commit and tag to origin automatically.
push = true
push-remote = "origin"
